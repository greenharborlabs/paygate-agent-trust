# fly.toml app configuration file generated for paygate-agent-trust on 2026-06-02T17:07:22-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'paygate-agent-trust'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = 'requests'
    soft_limit = 12
    hard_limit = 16

  [[http_service.checks]]
    interval = '10s'
    timeout = '2s'
    grace_period = '45s'
    method = 'GET'
    path = '/healthz'

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024

[deploy]
  strategy = 'rolling'
