name: Tagged production release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify immutable release tag
        run: scripts/verify-release-tag.sh "${GITHUB_REF_NAME}"
      - uses: gradle/actions/wrapper-validation@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: gradle
      - name: Build release
        run: ./gradlew clean build --no-daemon
      - name: Check shell scripts
        run: shellcheck scripts/*.sh
      - name: Scan repository for secrets
        run: scripts/scan-secrets.sh
      - name: Upload static-analysis reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: static-analysis-reports-${{ github.ref_name }}
          path: |
            build/reports/pmd/main.html
            build/reports/spotbugs/main.html
          if-no-files-found: warn
      - name: Scan dependencies and filesystem
        uses: aquasecurity/trivy-action@v0.31.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: "1"
      - name: Smoke production container
        run: scripts/container-smoke.sh
      # v1.6
      - uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1
      - name: Validate Fly configuration
        run: flyctl config validate
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      - name: Deploy tagged commit
        run: flyctl deploy --remote-only --strategy rolling --yes
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      - name: Wait for Fly checks
        run: flyctl checks list --json | tee fly-checks.json
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      - name: Verify unauthenticated production behavior
        run: scripts/production-smoke.sh
        env:
          BASE_URL: https://paygate-agent-trust.fly.dev
          EXPECTED_KEY_ID: ${{ vars.REPORT_SIGNING_KEY_ID }}
      - name: Capture deployment metadata
        run: |
          flyctl status --json > fly-status.json
          printf 'Tag: %s\nCommit: %s\n' "$GITHUB_REF_NAME" "$GITHUB_SHA" > release-metadata.txt
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: production-${{ github.ref_name }}
          path: |
            fly-checks.json
            fly-status.json
            release-metadata.txt
      - name: Record paid-smoke handoff
        run: echo "Deployment verified. Run the protected Finalize production release workflow after the Breez paid smoke passes." >> "$GITHUB_STEP_SUMMARY"
